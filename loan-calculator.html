<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Loan Calculator</title>
<style>
body{
font-family:Arial;
max-width:600px;
margin:auto;
padding:40px;
text-align:center;
}
input{
padding:8px;
margin:5px;
width:140px;
}
button{
padding:10px 20px;
margin-top:10px;
}
</style>
</head>

<body>

<h1>Loan Calculator</h1>

<p>Calculate monthly loan payment</p>

<input id="amount" placeholder="Loan amount">
<input id="rate" placeholder="Interest rate %">
<input id="months" placeholder="Months">

<br>

<button onclick="calc()">Calculate</button>

<h2 id="result"></h2>

<script>
function calc(){

let amount = document.getElementById("amount").value;
let rate = document.getElementById("rate").value/100/12;
let months = document.getElementById("months").value;

let payment = (amount*rate)/(1-Math.pow(1+rate,-months));

document.getElementById("result").innerText = payment.toFixed(2);

}
</script>

</body>
</html>
